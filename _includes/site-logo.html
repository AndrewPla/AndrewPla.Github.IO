<a class="logo" href="{{ site.baseurl }}/" aria-label="{{ site.title }}">
  {% if site.logo %}
    <img src="{{ site.baseurl }}{{ site.logo }}" alt="{{ site.title | append: ' logo' }}"/>
  {% else %}
    <span class="wordmark">{{ site.title }}</span>
    <span class="wordmark-secondary">APT</span>
  {% endif %}
</a>
