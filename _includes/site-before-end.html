<script>
  (function () {
    var key = "ap-site-mode";
    var mode = "normal";
    var toggleBtn = null;
    var retroChrome = null;
    var retroCounter = null;
    var retroClock = null;
    var retroClockTimer = 0;

    try {
      mode = localStorage.getItem(key) || "normal";
    } catch (e) {
      mode = "normal";
    }

    function apply(nextMode) {
      var body = document.body;
      if (!body) return;
      body.classList.toggle("mode-retro", nextMode === "retro");
      body.dataset.siteMode = nextMode;

      if (toggleBtn) {
        toggleBtn.textContent = nextMode === "retro" ? "normal" : "retro";
        toggleBtn.title = nextMode === "retro" ? "Switch to normal mode" : "Switch to retro mode";
      }

      if (nextMode === "retro") {
        enableRetro();
      } else {
        disableRetro();
      }
    }

    function createRetroChrome() {
      if (retroChrome) return;
      retroChrome = document.createElement("div");
      retroChrome.className = "ap-retro-chrome";
      retroChrome.innerHTML =
        "<div class='ap-retro-titlebar'>" +
        "<div class='ap-retro-titlebar-inner'>" +
        "<span class='ap-retro-title'>AndrewPla.tech - Retro Desktop</span>" +
        "<span class='ap-retro-window-controls'><span></span><span></span><span></span></span>" +
        "</div>" +
        "</div>" +
        "<div class='ap-retro-taskbar'>" +
        "<div class='ap-retro-taskbar-inner'>" +
        "<div class='ap-retro-task-left'>" +
        "<span class='ap-retro-start'>Start</span>" +
        "<span class='ap-retro-task-pill'>AndrewPla.tech</span>" +
        "<span class='ap-retro-task-pill'>PowerShell Podcast</span>" +
        "</div>" +
        "<div class='ap-retro-tray'>" +
        "<span class='ap-retro-visit'>Visits <strong id='apRetroCounter'>000001</strong></span>" +
        "<span class='ap-retro-clock' id='apRetroClock'>--:--</span>" +
        "</div>" +
        "</div>" +
        "</div>";
      document.body.appendChild(retroChrome);
      retroCounter = document.getElementById("apRetroCounter");
      retroClock = document.getElementById("apRetroClock");
      incrementCounter();
      renderClock();
      retroClockTimer = window.setInterval(renderClock, 30000);
    }

    function incrementCounter() {
      var counterKey = "ap-retro-counter";
      var value = 1;
      try {
        value = Number(localStorage.getItem(counterKey) || "0") + 1;
        localStorage.setItem(counterKey, String(value));
      } catch (e) {
        value = 1;
      }
      if (retroCounter) {
        retroCounter.textContent = String(value).padStart(6, "0");
      }
    }

    function renderClock() {
      if (!retroClock) return;
      var now = new Date();
      var display = now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      retroClock.textContent = display;
    }

    function enableRetro() {
      createRetroChrome();
    }

    function disableRetro() {
      if (retroClockTimer) {
        window.clearInterval(retroClockTimer);
        retroClockTimer = 0;
      }
      if (retroChrome) {
        retroChrome.remove();
        retroChrome = null;
        retroCounter = null;
        retroClock = null;
      }
    }

    toggleBtn = document.createElement("button");
    toggleBtn.type = "button";
    toggleBtn.className = "ap-mode-toggle";
    toggleBtn.setAttribute("aria-label", "Toggle site mode");
    toggleBtn.addEventListener("click", function () {
      mode = mode === "retro" ? "normal" : "retro";
      try {
        localStorage.setItem(key, mode);
      } catch (e) {}
      apply(mode);
    });
    document.body.appendChild(toggleBtn);

    apply(mode);
  })();
</script>
